name: Verificar Preços de Favoritos

on:
  schedule:
    # Roda a cada 30 minutos
    - cron: '*/30 * * * *'
  workflow_dispatch: # Permite disparar manualmente pela aba "Actions" no GitHub

concurrency:
  group: verificar-precos
  cancel-in-progress: false

jobs:
  verificar-precos:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar API do Render
        run: |
          curl -f --retry 3 --retry-delay 5 --max-time 30 -X GET \
            -H "X-Cron-Token: ${{ secrets.CRON_TOKEN }}" \
            "${{ secrets.BACKEND_URL }}/api/cron/verificar-precos/"
